config:
  code: "/**\n * Action: list Bynder categories (folders) and media (assets) for a file-picker UI.\n *\n * Output: `{ records: [...], cursor: string | null }` (same shape as Frontify / Cloudinary).\n *\n * Action input:\n * - parentId (optional): Bynder category id. Omit, null, \"\", or \"root\" for the picker root.\n * - recursive (optional): `false` (default) = direct children only; `true` = entire subtree.\n * - cursor (optional): pagination token from the previous response.\n */\n\nconst PAGE_SIZE = 100;\n\nmodule.exports = async function ({ input, externalApiClient }) {\n\ttry {\n\t\tconst categoryId = resolveCategoryId(input?.parentId);\n\t\tconst recursive = Boolean(input?.recursive);\n\t\tconst parentIdKey = categoryId ?? \"\";\n\n\t\tconst state = decodeCursor(input?.cursor, {\n\t\t\tparentId: parentIdKey,\n\t\t\trecursive,\n\t\t});\n\n\t\tconst brandId =\n\t\t\tstate?.brandId ?? (await resolveBrandId(externalApiClient));\n\n\t\tconst { records, nextState } = await fetchPage({\n\t\t\texternalApiClient,\n\t\t\tcategoryId,\n\t\t\trecursive,\n\t\t\tbrandId,\n\t\t\tstate,\n\t\t});\n\n\t\treturn {\n\t\t\trecords,\n\t\t\tcursor: encodeCursor(\n\t\t\t\tnextState\n\t\t\t\t\t? { ...nextState, parentId: parentIdKey, recursive, brandId }\n\t\t\t\t\t: null,\n\t\t\t),\n\t\t};\n\t} catch (error) {\n\t\tthrow error;\n\t}\n};\n\nasync function resolveBrandId(externalApiClient) {\n\ttry {\n\t\tconst res = await apiGet(externalApiClient, \"/api/v4/brands/\");\n\t\tconst body = res?.body;\n\t\tconst brands = Array.isArray(body)\n\t\t\t? body\n\t\t\t: body && typeof body === \"object\"\n\t\t\t\t? Object.values(body)\n\t\t\t\t: [];\n\t\tconst id = brands[0]?.id ?? brands[0]?.Id ?? brands[0]?.ID;\n\t\treturn id ? String(id) : null;\n\t} catch {\n\t\treturn null;\n\t}\n}\n\nfunction resolveCategoryId(parentId) {\n\tif (parentId == null) {\n\t\treturn null;\n\t}\n\n\tconst raw = String(parentId).trim();\n\tif (!raw || raw.toLowerCase() === \"root\") {\n\t\treturn null;\n\t}\n\n\ttry {\n\t\tconst decoded = JSON.parse(Buffer.from(raw, \"base64\").toString(\"utf8\"));\n\t\tconst type = String(decoded?.type ?? \"\").toLowerCase();\n\t\tif (type === \"folder\" && decoded?.id) {\n\t\t\treturn String(decoded.id);\n\t\t}\n\t\tif (\n\t\t\t[\"root\", \"my-drive\", \"drive\", \"category\", \"brand\", \"library\"].includes(\n\t\t\t\ttype,\n\t\t\t)\n\t\t) {\n\t\t\treturn null;\n\t\t}\n\t} catch {\n\t\t// Raw Bynder category id.\n\t}\n\n\treturn raw;\n}\n\nfunction defaultState(categoryId, recursive) {\n\tif (recursive) {\n\t\treturn {\n\t\t\tphase: \"assets\",\n\t\t\tpage: 1,\n\t\t\tcategoryId,\n\t\t\tapiCursor: null,\n\t\t\tcategoriesLoaded: false,\n\t\t};\n\t}\n\treturn {\n\t\tphase: \"folders\",\n\t\tpage: 1,\n\t\tcategoryId,\n\t\tcategoriesLoaded: false,\n\t\tfolderOffset: 0,\n\t};\n}\n\nfunction decodeCursor(cursor, context) {\n\tif (cursor == null || String(cursor).trim() === \"\") {\n\t\treturn null;\n\t}\n\n\ttry {\n\t\tconst parsed = JSON.parse(\n\t\t\tBuffer.from(String(cursor).trim(), \"base64\").toString(\"utf8\"),\n\t\t);\n\t\tif (!parsed?.phase) {\n\t\t\tthrow new Error(\"Invalid cursor\");\n\t\t}\n\t\tif ((parsed.parentId ?? \"\") !== (context.parentId ?? \"\")) {\n\t\t\tthrow new Error(\"cursor parentId does not match input parentId\");\n\t\t}\n\t\tif (\n\t\t\tparsed.recursive != null &&\n\t\t\tBoolean(parsed.recursive) !== context.recursive\n\t\t) {\n\t\t\tthrow new Error(\"cursor recursive flag does not match input recursive\");\n\t\t}\n\t\treturn parsed;\n\t} catch (error) {\n\t\tif (error.message?.includes(\"does not match\")) {\n\t\t\tthrow error;\n\t\t}\n\t\tthrow new Error(\"cursor must be a base64-encoded pagination state\");\n\t}\n}\n\nfunction encodeCursor(state) {\n\tif (!state) return null;\n\treturn Buffer.from(JSON.stringify(state), \"utf8\").toString(\"base64\");\n}\n\nasync function fetchPage({\n\texternalApiClient,\n\tcategoryId,\n\trecursive,\n\tbrandId,\n\tstate,\n}) {\n\tconst activeState = {\n\t\t...(state ?? defaultState(categoryId, recursive)),\n\t\tcategoryId,\n\t\tbrandId,\n\t};\n\tconst records = [];\n\n\tif (activeState.phase === \"folders\") {\n\t\tconst categories = await loadCategories(externalApiClient, activeState);\n\t\tconst children = getDirectChildCategories(categories, categoryId);\n\t\tconst offset = activeState.folderOffset ?? 0;\n\t\tconst pageItems = children.slice(offset, offset + PAGE_SIZE);\n\t\tconst nextOffset = offset + pageItems.length;\n\n\t\tfor (const category of pageItems) {\n\t\t\trecords.push(mapCategoryToRecord(category, categoryId));\n\t\t}\n\n\t\tif (nextOffset < children.length) {\n\t\t\treturn {\n\t\t\t\trecords,\n\t\t\t\tnextState: {\n\t\t\t\t\t...activeState,\n\t\t\t\t\tphase: \"folders\",\n\t\t\t\t\tcategoriesLoaded: true,\n\t\t\t\t\tcategories,\n\t\t\t\t\tfolderOffset: nextOffset,\n\t\t\t\t},\n\t\t\t};\n\t\t}\n\n\t\treturn {\n\t\t\trecords,\n\t\t\tnextState: {\n\t\t\t\t...activeState,\n\t\t\t\tphase: \"assets\",\n\t\t\t\tpage: 1,\n\t\t\t\tapiCursor: null,\n\t\t\t\tcategoriesLoaded: true,\n\t\t\t\tcategories,\n\t\t\t\tfolderOffset: 0,\n\t\t\t},\n\t\t};\n\t}\n\n\tconst categories =\n\t\tactiveState.categories ??\n\t\t(await loadCategories(externalApiClient, activeState));\n\n\treturn fetchAssetsPage({\n\t\texternalApiClient,\n\t\tcategoryId,\n\t\trecursive,\n\t\tbrandId,\n\t\trecords,\n\t\tstate: { ...activeState, categories, categoriesLoaded: true },\n\t\tcategories,\n\t});\n}\n\nasync function fetchAssetsPage({\n\texternalApiClient,\n\tcategoryId,\n\trecursive,\n\tbrandId,\n\trecords,\n\tstate,\n\tcategories,\n}) {\n\tconst descendantIds =\n\t\trecursive && categoryId\n\t\t\t? buildDescendantCategoryIds(categories, categoryId)\n\t\t\t: null;\n\n\tconst page = state.page ?? 1;\n\tconst query = {\n\t\tlimit: PAGE_SIZE,\n\t\tpage,\n\t\torderBy: \"dateModified desc\",\n\t};\n\n\tif (state.apiCursor) {\n\t\tquery.cursor = state.apiCursor;\n\t\tdelete query.page;\n\t}\n\n\tif (brandId) {\n\t\tquery.brandId = brandId;\n\t}\n\n\tif (!recursive && categoryId) {\n\t\tquery.categoryId = categoryId;\n\t}\n\n\tconst mediaRes = await apiGet(externalApiClient, \"/api/v4/media/\", query);\n\n\tfor (const asset of normalizeMediaList(mediaRes.body)) {\n\t\tif (recursive && categoryId) {\n\t\t\tif (!assetMatchesCategoryTree(asset, descendantIds)) {\n\t\t\t\tcontinue;\n\t\t\t}\n\t\t}\n\t\trecords.push(mapAssetToRecord(asset, categoryId, recursive, categories));\n\t}\n\n\tconst nextApiCursor = mediaRes.nextCursor;\n\tif (nextApiCursor) {\n\t\treturn {\n\t\t\trecords,\n\t\t\tnextState: {\n\t\t\t\t...state,\n\t\t\t\tphase: \"assets\",\n\t\t\t\tpage: page + 1,\n\t\t\t\tapiCursor: nextApiCursor,\n\t\t\t\tcategoriesLoaded: true,\n\t\t\t\tcategories,\n\t\t\t},\n\t\t};\n\t}\n\n\tconst total =\n\t\tmediaRes.body?.total ?? mediaRes.body?.count ?? normalizeMediaList(mediaRes.body).length;\n\tconst hasMoreByPage =\n\t\t!nextApiCursor && normalizeMediaList(mediaRes.body).length >= PAGE_SIZE;\n\n\tif (hasMoreByPage && (total == null || page * PAGE_SIZE < total)) {\n\t\treturn {\n\t\t\trecords,\n\t\t\tnextState: {\n\t\t\t\t...state,\n\t\t\t\tphase: \"assets\",\n\t\t\t\tpage: page + 1,\n\t\t\t\tapiCursor: null,\n\t\t\t\tcategoriesLoaded: true,\n\t\t\t\tcategories,\n\t\t\t},\n\t\t};\n\t}\n\n\treturn { records, nextState: null };\n}\n\nasync function loadCategories(externalApiClient, state) {\n\tif (state.categoriesLoaded && state.categories) {\n\t\treturn state.categories;\n\t}\n\tconst res = await apiGet(externalApiClient, \"/api/v4/categories/\");\n\treturn normalizeCategoryList(res.body);\n}\n\nasync function apiGet(externalApiClient, path, query = {}) {\n\tconst qs = buildQuery(query);\n\tconst res = await externalApiClient.get(`${path}${qs}`);\n\tconst body = res?.data ?? res;\n\tconst headers = res?.headers ?? {};\n\tconst nextCursor =\n\t\theaders[\"x-bynder-nextcursor\"] ??\n\t\theaders[\"X-Bynder-NextCursor\"] ??\n\t\theaders[\"x-bynder-next-cursor\"] ??\n\t\tnull;\n\treturn { body, nextCursor };\n}\n\nfunction buildQuery(params) {\n\tconst search = new URLSearchParams();\n\tfor (const [key, value] of Object.entries(params)) {\n\t\tif (value != null && value !== \"\") {\n\t\t\tsearch.set(key, String(value));\n\t\t}\n\t}\n\tconst qs = search.toString();\n\treturn qs ? `?${qs}` : \"\";\n}\n\nfunction normalizeCategoryList(body) {\n\tif (Array.isArray(body)) {\n\t\treturn body.map(normalizeCategory).filter((c) => c.id);\n\t}\n\tif (body && typeof body === \"object\") {\n\t\treturn Object.values(body).map(normalizeCategory).filter((c) => c.id);\n\t}\n\treturn [];\n}\n\nfunction normalizeCategory(raw) {\n\tconst id = String(\n\t\traw?.id ?? raw?.ID ?? raw?.Cid ?? raw?.cid ?? raw?.categoryId ?? \"\",\n\t).trim();\n\tconst parentRaw =\n\t\traw?.parentId ??\n\t\traw?.ParentCid ??\n\t\traw?.parentCid ??\n\t\traw?.parent_id ??\n\t\traw?.ParentCID ??\n\t\t0;\n\tconst parentId = isRootParentValue(parentRaw) ? null : String(parentRaw);\n\n\treturn {\n\t\tid,\n\t\tname: raw?.name ?? raw?.Name ?? raw?.label ?? id,\n\t\tparentId,\n\t\trawFields: raw,\n\t};\n}\n\nfunction normalizeMediaList(body) {\n\tif (Array.isArray(body)) {\n\t\treturn body;\n\t}\n\tif (Array.isArray(body?.media)) {\n\t\treturn body.media;\n\t}\n\tif (body && typeof body === \"object\") {\n\t\tconst values = Object.values(body);\n\t\tif (values.length && values.every((v) => v && typeof v === \"object\")) {\n\t\t\treturn values;\n\t\t}\n\t}\n\treturn [];\n}\n\nfunction isRootParentValue(value) {\n\tif (value == null || value === \"\") return true;\n\tif (value === 0 || value === \"0\") return true;\n\treturn false;\n}\n\nfunction getDirectChildCategories(categories, parentCategoryId) {\n\treturn categories.filter((cat) => {\n\t\tif (parentCategoryId) {\n\t\t\treturn cat.parentId === parentCategoryId;\n\t\t}\n\t\treturn cat.parentId == null;\n\t});\n}\n\nfunction buildDescendantCategoryIds(categories, rootCategoryId) {\n\tconst childrenByParent = new Map();\n\tfor (const cat of categories) {\n\t\tconst key = cat.parentId ?? \"__root__\";\n\t\tif (!childrenByParent.has(key)) {\n\t\t\tchildrenByParent.set(key, []);\n\t\t}\n\t\tchildrenByParent.get(key).push(cat.id);\n\t}\n\n\tconst ids = new Set([rootCategoryId]);\n\tconst stack = [rootCategoryId];\n\twhile (stack.length) {\n\t\tconst current = stack.pop();\n\t\tfor (const childId of childrenByParent.get(current) ?? []) {\n\t\t\tif (!ids.has(childId)) {\n\t\t\t\tids.add(childId);\n\t\t\t\tstack.push(childId);\n\t\t\t}\n\t\t}\n\t}\n\treturn ids;\n}\n\nfunction assetCategoryIds(asset) {\n\tif (Array.isArray(asset?.categories)) {\n\t\treturn asset.categories.map((c) =>\n\t\t\tString(typeof c === \"object\" ? (c?.id ?? c?.Cid ?? \"\") : c),\n\t\t);\n\t}\n\tif (Array.isArray(asset?.categoryIds)) {\n\t\treturn asset.categoryIds.map(String);\n\t}\n\treturn [];\n}\n\nfunction assetMatchesCategoryTree(asset, descendantIds) {\n\tconst ids = assetCategoryIds(asset);\n\treturn ids.some((id) => descendantIds.has(id));\n}\n\nfunction primaryParentCategoryId(asset, categoriesById) {\n\tconst ids = assetCategoryIds(asset);\n\tif (!ids.length) return null;\n\n\tconst withDepth = ids\n\t\t.map((id) => ({\n\t\t\tid,\n\t\t\tdepth: categoryDepth(id, categoriesById),\n\t\t}))\n\t\t.filter((entry) => entry.depth >= 0);\n\n\twithDepth.sort((a, b) => b.depth - a.depth);\n\treturn withDepth[0]?.id ?? ids[0];\n}\n\nfunction categoryDepth(categoryId, categoriesById) {\n\tlet depth = 0;\n\tlet current = categoriesById.get(categoryId);\n\tconst guard = new Set();\n\twhile (current?.parentId && !guard.has(current.parentId)) {\n\t\tguard.add(current.parentId);\n\t\tdepth += 1;\n\t\tcurrent = categoriesById.get(current.parentId);\n\t}\n\treturn categoriesById.has(categoryId) ? depth : -1;\n}\n\nfunction assetResourceUri(asset) {\n\tif (typeof asset?.original === \"string\" && asset.original) {\n\t\treturn asset.original;\n\t}\n\tif (asset?.originalUrl) {\n\t\treturn asset.originalUrl;\n\t}\n\tconst thumbs = asset?.thumbnails ?? asset?.thumbnail ?? {};\n\tfor (const key of [\"webimage\", \"transformBaseUrl\", \"mini\", \"thul\", \"preview\"]) {\n\t\tconst entry = thumbs[key];\n\t\tconst url = typeof entry === \"string\" ? entry : entry?.url;\n\t\tif (url) return url;\n\t}\n\treturn asset?.id ?? \"\";\n}\n\nfunction parentIdForListingCategory(categoryId) {\n\treturn categoryId ?? null;\n}\n\nfunction mapCategoryToRecord(category, listingCategoryId) {\n\tconst id = category.id;\n\tconst title = category.name ?? id;\n\n\treturn buildRecord({\n\t\tid,\n\t\ttitle,\n\t\tparentId: parentIdForListingCategory(listingCategoryId),\n\t\tcanHaveChildren: true,\n\t\tcanDownload: false,\n\t\tresourceURI: id,\n\t\tcreatedAt: null,\n\t\tupdatedAt: null,\n\t\trawFields: category.rawFields ?? category,\n\t});\n}\n\nfunction mapAssetToRecord(asset, listingCategoryId, recursive, categories = []) {\n\tconst id = String(asset?.id ?? asset?.mediaId ?? \"\");\n\tconst title = asset?.name ?? asset?.title ?? id;\n\tconst categoriesById = new Map(categories.map((c) => [c.id, c]));\n\tconst parentId = recursive\n\t\t? primaryParentCategoryId(asset, categoriesById)\n\t\t: parentIdForListingCategory(listingCategoryId);\n\tconst createdAt = asset?.dateCreated ?? asset?.createdAt ?? null;\n\tconst updatedAt = asset?.dateModified ?? asset?.modifiedAt ?? createdAt;\n\tconst resourceURI = assetResourceUri(asset);\n\n\treturn buildRecord({\n\t\tid,\n\t\ttitle,\n\t\tparentId,\n\t\tcanHaveChildren: false,\n\t\tcanDownload: Boolean(resourceURI && resourceURI !== id),\n\t\tresourceURI,\n\t\tcreatedAt,\n\t\tupdatedAt,\n\t\trawFields: asset,\n\t});\n}\n\nfunction buildRecord({\n\tid,\n\ttitle,\n\tparentId,\n\tcanHaveChildren,\n\tcanDownload,\n\tresourceURI,\n\tcreatedAt,\n\tupdatedAt,\n\trawFields,\n}) {\n\tconst fields = {\n\t\tid,\n\t\ttitle,\n\t\tcreatedAt,\n\t\tupdatedAt,\n\t\tparentId,\n\t\tcanHaveChildren,\n\t\tresourceURI,\n\t\tcanDownload,\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid,\n\t\tname: title,\n\t\turi: resourceURI,\n\t\tcreatedTime: createdAt,\n\t\tupdatedTime: updatedAt,\n\t\trawFields,\n\t};\n}\n"
