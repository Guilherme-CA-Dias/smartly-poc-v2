config:
  code: "/**\n * Action: list Frontify folders and assets for a file-picker UI.\n *\n * Output: `{ records: [...], cursor: string | null }` (same shape as Cloudinary / Google Drive).\n *\n * Action input:\n * - parentId (optional): Frontify folder id to list children of. Omit, null, \"\", or \"root\"\n *   for the account library/workspace root (resolved via API).\n * - recursive (optional): `false` (default) = direct children only; `true` = full subtree.\n * - cursor (optional): pagination token from the previous response.\n */\n\nconst PAGE_SIZE = 100;\nconst GRAPHQL_PATH = \"/graphql\";\n\nconst FOLDER_ITEM_FIELDS = `\n\tid\n\tname\n\tcreatedAt\n\tmodifiedAt\n`;\n\nconst ASSET_ITEM_FIELDS = `\n\tid\n\ttitle\n\tcreatedAt\n\tmodifiedAt\n\tstatus\n\tlocation {\n\t\tfolder {\n\t\t\tid\n\t\t\tname\n\t\t\tbreadcrumbs { id name }\n\t\t}\n\t}\n\tattachments {\n\t\tdownloadUrl\n\t\tfilename\n\t\textension\n\t}\n`;\n\nmodule.exports = async function ({ input, externalApiClient }) {\n\ttry {\n\t\tconst folderId = resolveFolderId(input?.parentId);\n\t\tconst recursive = Boolean(input?.recursive);\n\t\tconst parentIdKey = folderId ?? \"\";\n\n\t\tconst cursorState = decodeCursor(input?.cursor, {\n\t\t\tparentId: parentIdKey,\n\t\t\trecursive,\n\t\t});\n\n\t\tconst container =\n\t\t\tcursorState?.containerKind && cursorState?.containerId\n\t\t\t\t? { kind: cursorState.containerKind, id: cursorState.containerId }\n\t\t\t\t: await resolveContainer(externalApiClient, folderId);\n\n\t\tconst state = cursorState\n\t\t\t? { ...cursorState, folderId }\n\t\t\t: null;\n\n\t\tconst { records, nextState } = await fetchPage({\n\t\t\texternalApiClient,\n\t\t\tcontainer,\n\t\t\tfolderId,\n\t\t\trecursive,\n\t\t\tstate,\n\t\t});\n\n\t\treturn {\n\t\t\trecords,\n\t\t\tcursor: encodeCursor(\n\t\t\t\tnextState\n\t\t\t\t\t? {\n\t\t\t\t\t\t\t...nextState,\n\t\t\t\t\t\t\tparentId: parentIdKey,\n\t\t\t\t\t\t\trecursive,\n\t\t\t\t\t\t\tcontainerKind: container.kind,\n\t\t\t\t\t\t\tcontainerId: container.id,\n\t\t\t\t\t\t}\n\t\t\t\t\t: null,\n\t\t\t),\n\t\t};\n\t} catch (error) {\n\t\tthrow error;\n\t}\n};\n\nasync function resolveContainer(externalApiClient, folderId) {\n\tif (folderId) {\n\t\tconst fromFolder = await resolveContainerFromFolder(\n\t\t\texternalApiClient,\n\t\t\tfolderId,\n\t\t);\n\t\tif (fromFolder) {\n\t\t\treturn fromFolder;\n\t\t}\n\t}\n\treturn resolveDefaultContainer(externalApiClient);\n}\n\nasync function resolveDefaultContainer(externalApiClient) {\n\tconst brandsData = await graphqlRequest(\n\t\texternalApiClient,\n\t\t`query FrontifyBrands { brands { id } }`,\n\t);\n\tconst brandId = brandsData?.brands?.[0]?.id;\n\tif (!brandId) {\n\t\tthrow new Error(\"No Frontify brands found for this connection\");\n\t}\n\n\tconst data = await graphqlRequest(\n\t\texternalApiClient,\n\t\t`query FrontifyBrandContainers($id: ID!) {\n\t\t\tbrand(id: $id) {\n\t\t\t\tlibraries(limit: 1, page: 1) { items { id } }\n\t\t\t\tworkspaceProjects(limit: 1, page: 1) { items { id } }\n\t\t\t}\n\t\t}`,\n\t\t{ id: brandId },\n\t);\n\n\tconst libraryId = data?.brand?.libraries?.items?.[0]?.id;\n\tif (libraryId) {\n\t\treturn { kind: \"library\", id: libraryId };\n\t}\n\n\tconst workspaceProjectId = data?.brand?.workspaceProjects?.items?.[0]?.id;\n\tif (workspaceProjectId) {\n\t\treturn { kind: \"workspaceProject\", id: workspaceProjectId };\n\t}\n\n\tthrow new Error(\"No Frontify library or workspace project found for this connection\");\n}\n\nasync function resolveContainerFromFolder(externalApiClient, folderId) {\n\tconst data = await graphqlRequest(\n\t\texternalApiClient,\n\t\t`query FrontifyFolderContainer($id: ID!) {\n\t\t\tnode(id: $id) {\n\t\t\t\t... on SubFolder {\n\t\t\t\t\tassets(limit: 1, page: 1) {\n\t\t\t\t\t\titems {\n\t\t\t\t\t\t\tlocation {\n\t\t\t\t\t\t\t\tlibrary { id }\n\t\t\t\t\t\t\t\tworkspaceProject { id }\n\t\t\t\t\t\t\t}\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}`,\n\t\t{ id: folderId },\n\t);\n\n\tconst location = data?.node?.assets?.items?.[0]?.location;\n\tif (location?.library?.id) {\n\t\treturn { kind: \"library\", id: location.library.id };\n\t}\n\tif (location?.workspaceProject?.id) {\n\t\treturn { kind: \"workspaceProject\", id: location.workspaceProject.id };\n\t}\n\n\treturn null;\n}\n\n/** Returns folder id, or null for library/workspace root. */\nfunction resolveFolderId(parentId) {\n\tif (parentId == null) {\n\t\treturn null;\n\t}\n\n\tconst raw = String(parentId).trim();\n\tif (!raw || raw.toLowerCase() === \"root\") {\n\t\treturn null;\n\t}\n\n\t// Backward compatibility: encoded `{ id, type: \"folder\" }` from older payloads.\n\ttry {\n\t\tconst decoded = JSON.parse(Buffer.from(raw, \"base64\").toString(\"utf8\"));\n\t\tconst type = String(decoded?.type ?? \"\").toLowerCase();\n\t\tif (type === \"folder\" && decoded?.id) {\n\t\t\treturn String(decoded.id);\n\t\t}\n\t\tif ([\"root\", \"my-drive\", \"drive\", \"library\", \"workspaceproject\", \"workspace\", \"brand\"].includes(type)) {\n\t\t\treturn null;\n\t\t}\n\t} catch {\n\t\t// Treat as a raw Frontify folder id.\n\t}\n\n\treturn raw;\n}\n\nfunction defaultState(folderId, recursive) {\n\tif (recursive) {\n\t\treturn { phase: \"assets\", page: 1, folderId };\n\t}\n\treturn { phase: \"folders\", page: 1, folderId };\n}\n\nfunction decodeCursor(cursor, context) {\n\tif (cursor == null || String(cursor).trim() === \"\") {\n\t\treturn null;\n\t}\n\n\ttry {\n\t\tconst parsed = JSON.parse(\n\t\t\tBuffer.from(String(cursor).trim(), \"base64\").toString(\"utf8\"),\n\t\t);\n\t\tif (!parsed?.phase) {\n\t\t\tthrow new Error(\"Invalid cursor\");\n\t\t}\n\n\t\tif ((parsed.parentId ?? \"\") !== (context.parentId ?? \"\")) {\n\t\t\tthrow new Error(\"cursor parentId does not match input parentId\");\n\t\t}\n\t\tif (\n\t\t\tparsed.recursive != null &&\n\t\t\tBoolean(parsed.recursive) !== context.recursive\n\t\t) {\n\t\t\tthrow new Error(\"cursor recursive flag does not match input recursive\");\n\t\t}\n\n\t\treturn parsed;\n\t} catch (error) {\n\t\tif (error.message?.includes(\"does not match\")) {\n\t\t\tthrow error;\n\t\t}\n\t\tthrow new Error(\"cursor must be a base64-encoded pagination state\");\n\t}\n}\n\nfunction encodeCursor(state) {\n\tif (!state) return null;\n\treturn Buffer.from(JSON.stringify(state), \"utf8\").toString(\"base64\");\n}\n\nasync function fetchPage({ externalApiClient, container, folderId, recursive, state }) {\n\tconst activeState = state ?? defaultState(folderId, recursive);\n\tconst records = [];\n\n\tif (activeState.phase === \"folders\") {\n\t\tconst page = activeState.page ?? 1;\n\t\tconst { folders, hasNextPage } = await listFolders(\n\t\t\texternalApiClient,\n\t\t\tcontainer,\n\t\t\tfolderId,\n\t\t\tpage,\n\t\t);\n\n\t\tfor (const folder of folders) {\n\t\t\trecords.push(mapFolderToRecord(folder, folderId));\n\t\t}\n\n\t\tif (hasNextPage) {\n\t\t\treturn {\n\t\t\t\trecords,\n\t\t\t\tnextState: { phase: \"folders\", page: page + 1, folderId },\n\t\t\t};\n\t\t}\n\n\t\treturn {\n\t\t\trecords,\n\t\t\tnextState: { phase: \"assets\", page: 1, folderId },\n\t\t};\n\t}\n\n\treturn fetchAssetsPage({\n\t\texternalApiClient,\n\t\tcontainer,\n\t\trecords,\n\t\tstate: activeState,\n\t\tfolderId,\n\t\trecursive,\n\t});\n}\n\nasync function fetchAssetsPage({\n\texternalApiClient,\n\tcontainer,\n\trecords,\n\tstate,\n\tfolderId,\n\trecursive,\n}) {\n\tconst page = state.page ?? 1;\n\tconst { items, hasNextPage } = await listAssets(\n\t\texternalApiClient,\n\t\tcontainer,\n\t\tfolderId,\n\t\trecursive,\n\t\tpage,\n\t);\n\n\tfor (const asset of items) {\n\t\tif (recursive && folderId && !assetInFolderSubtree(asset, folderId)) {\n\t\t\tcontinue;\n\t\t}\n\t\trecords.push(mapAssetToRecord(asset, folderId, recursive));\n\t}\n\n\tif (hasNextPage) {\n\t\treturn {\n\t\t\trecords,\n\t\t\tnextState: { phase: \"assets\", page: page + 1, folderId },\n\t\t};\n\t}\n\n\treturn { records, nextState: null };\n}\n\nasync function graphqlRequest(externalApiClient, query, variables = {}) {\n\tconst res = await externalApiClient.post(GRAPHQL_PATH, { query, variables });\n\tconst body = res?.data ?? res;\n\tif (body?.errors?.length) {\n\t\tthrow new Error(body.errors.map((e) => e.message).join(\"; \"));\n\t}\n\treturn body?.data ?? body;\n}\n\nasync function listFolders(externalApiClient, container, folderId, page) {\n\tif (folderId) {\n\t\tconst data = await graphqlRequest(\n\t\t\texternalApiClient,\n\t\t\t`query FolderChildren($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\t\tnode(id: $id) {\n\t\t\t\t\t... on SubFolder {\n\t\t\t\t\t\tfolders(limit: $limit, page: $page) {\n\t\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\t\titems { ${FOLDER_ITEM_FIELDS} }\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}`,\n\t\t\t{ id: folderId, limit: PAGE_SIZE, page },\n\t\t);\n\t\tconst block = data?.node?.folders;\n\t\treturn {\n\t\t\tfolders: block?.items ?? [],\n\t\t\thasNextPage: Boolean(block?.hasNextPage),\n\t\t};\n\t}\n\n\tif (container.kind === \"library\") {\n\t\tconst data = await graphqlRequest(\n\t\t\texternalApiClient,\n\t\t\t`query LibraryFolders($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\t\tlibrary(id: $id) {\n\t\t\t\t\tbrowse {\n\t\t\t\t\t\tfolders(limit: $limit, page: $page) {\n\t\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\t\titems { ${FOLDER_ITEM_FIELDS} }\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}`,\n\t\t\t{ id: container.id, limit: PAGE_SIZE, page },\n\t\t);\n\t\tconst block = data?.library?.browse?.folders;\n\t\treturn {\n\t\t\tfolders: block?.items ?? [],\n\t\t\thasNextPage: Boolean(block?.hasNextPage),\n\t\t};\n\t}\n\n\tconst data = await graphqlRequest(\n\t\texternalApiClient,\n\t\t`query WorkspaceFolders($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\tworkspaceProject(id: $id) {\n\t\t\t\tbrowse {\n\t\t\t\t\tfolders(limit: $limit, page: $page) {\n\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\titems { ${FOLDER_ITEM_FIELDS} }\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}\n\t\t}`,\n\t\t{ id: container.id, limit: PAGE_SIZE, page },\n\t);\n\tconst block = data?.workspaceProject?.browse?.folders;\n\treturn {\n\t\tfolders: block?.items ?? [],\n\t\thasNextPage: Boolean(block?.hasNextPage),\n\t};\n}\n\nasync function listAssets(externalApiClient, container, folderId, recursive, page) {\n\tif (folderId && !recursive) {\n\t\tconst data = await graphqlRequest(\n\t\t\texternalApiClient,\n\t\t\t`query FolderAssets($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\t\tnode(id: $id) {\n\t\t\t\t\t... on SubFolder {\n\t\t\t\t\t\tassets(limit: $limit, page: $page) {\n\t\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\t\titems { ${ASSET_ITEM_FIELDS} }\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}`,\n\t\t\t{ id: folderId, limit: PAGE_SIZE, page },\n\t\t);\n\t\tconst block = data?.node?.assets;\n\t\treturn {\n\t\t\titems: block?.items ?? [],\n\t\t\thasNextPage: Boolean(block?.hasNextPage),\n\t\t};\n\t}\n\n\tif (container.kind === \"library\") {\n\t\tif (!recursive && !folderId) {\n\t\t\tconst data = await graphqlRequest(\n\t\t\t\texternalApiClient,\n\t\t\t\t`query LibraryBrowseAssets($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\t\t\tlibrary(id: $id) {\n\t\t\t\t\t\tbrowse {\n\t\t\t\t\t\t\tassets(limit: $limit, page: $page) {\n\t\t\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\t\t\titems { ${ASSET_ITEM_FIELDS} }\n\t\t\t\t\t\t\t}\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}`,\n\t\t\t\t{ id: container.id, limit: PAGE_SIZE, page },\n\t\t\t);\n\t\t\tconst block = data?.library?.browse?.assets;\n\t\t\treturn {\n\t\t\t\titems: block?.items ?? [],\n\t\t\t\thasNextPage: Boolean(block?.hasNextPage),\n\t\t\t};\n\t\t}\n\n\t\tconst variables = { id: container.id, limit: PAGE_SIZE, page };\n\t\tif (!recursive && folderId) {\n\t\t\tvariables.query = { inFolder: { folderId } };\n\t\t}\n\n\t\tconst query = variables.query\n\t\t\t? `query LibraryAssetsInFolder($id: ID!, $limit: Int!, $page: Int!, $query: AssetQueryInput) {\n\t\t\t\t\tlibrary(id: $id) {\n\t\t\t\t\t\tassets(limit: $limit, page: $page, query: $query) {\n\t\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\t\titems { ${ASSET_ITEM_FIELDS} }\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}`\n\t\t\t: `query LibraryAssets($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\t\t\tlibrary(id: $id) {\n\t\t\t\t\t\tassets(limit: $limit, page: $page) {\n\t\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\t\titems { ${ASSET_ITEM_FIELDS} }\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}`;\n\n\t\tconst data = await graphqlRequest(externalApiClient, query, variables);\n\t\tconst block = data?.library?.assets;\n\t\treturn {\n\t\t\titems: block?.items ?? [],\n\t\t\thasNextPage: Boolean(block?.hasNextPage),\n\t\t};\n\t}\n\n\tif (!recursive && !folderId) {\n\t\tconst data = await graphqlRequest(\n\t\t\texternalApiClient,\n\t\t\t`query WorkspaceBrowseAssets($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\t\tworkspaceProject(id: $id) {\n\t\t\t\t\tbrowse {\n\t\t\t\t\t\tassets(limit: $limit, page: $page) {\n\t\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\t\titems { ${ASSET_ITEM_FIELDS} }\n\t\t\t\t\t\t}\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}`,\n\t\t\t{ id: container.id, limit: PAGE_SIZE, page },\n\t\t);\n\t\tconst block = data?.workspaceProject?.browse?.assets;\n\t\treturn {\n\t\t\titems: block?.items ?? [],\n\t\t\thasNextPage: Boolean(block?.hasNextPage),\n\t\t};\n\t}\n\n\tconst variables = { id: container.id, limit: PAGE_SIZE, page };\n\tif (!recursive && folderId) {\n\t\tvariables.query = { inFolder: { folderId } };\n\t}\n\n\tconst query = variables.query\n\t\t? `query WorkspaceAssetsInFolder($id: ID!, $limit: Int!, $page: Int!, $query: AssetQueryInput) {\n\t\t\t\tworkspaceProject(id: $id) {\n\t\t\t\t\tassets(limit: $limit, page: $page, query: $query) {\n\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\titems { ${ASSET_ITEM_FIELDS} }\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}`\n\t\t: `query WorkspaceAssets($id: ID!, $limit: Int!, $page: Int!) {\n\t\t\t\tworkspaceProject(id: $id) {\n\t\t\t\t\tassets(limit: $limit, page: $page) {\n\t\t\t\t\t\thasNextPage\n\t\t\t\t\t\titems { ${ASSET_ITEM_FIELDS} }\n\t\t\t\t\t}\n\t\t\t\t}\n\t\t\t}`;\n\n\tconst data = await graphqlRequest(externalApiClient, query, variables);\n\tconst block = data?.workspaceProject?.assets;\n\treturn {\n\t\titems: block?.items ?? [],\n\t\thasNextPage: Boolean(block?.hasNextPage),\n\t};\n}\n\nfunction assetInFolderSubtree(asset, folderId) {\n\tconst loc = asset?.location?.folder;\n\tif (!loc) return false;\n\tif (loc.id === folderId) return true;\n\treturn (loc.breadcrumbs ?? []).some((crumb) => crumb?.id === folderId);\n}\n\nfunction parentIdForListingFolder(folderId) {\n\treturn folderId ?? null;\n}\n\nfunction parentIdForAsset(asset, listingFolderId, recursive) {\n\tif (recursive) {\n\t\treturn asset?.location?.folder?.id ?? null;\n\t}\n\treturn listingFolderId ?? null;\n}\n\nfunction mapFolderToRecord(folder, listingFolderId) {\n\tconst id = folder.id;\n\tconst title = folder?.name ?? id;\n\tconst parentId = parentIdForListingFolder(listingFolderId);\n\n\treturn buildRecord({\n\t\tid,\n\t\ttitle,\n\t\tparentId,\n\t\tcanHaveChildren: true,\n\t\tcanDownload: false,\n\t\tresourceURI: id,\n\t\tcreatedAt: folder?.createdAt ?? null,\n\t\tupdatedAt: folder?.modifiedAt ?? null,\n\t\trawFields: folder,\n\t});\n}\n\nfunction mapAssetToRecord(asset, listingFolderId, recursive) {\n\tconst id = asset.id;\n\tconst title = asset?.title ?? id;\n\tconst parentId = parentIdForAsset(asset, listingFolderId, recursive);\n\tconst attachment = (asset?.attachments ?? []).find((a) => a?.downloadUrl);\n\tconst resourceURI = attachment?.downloadUrl ?? id;\n\n\treturn buildRecord({\n\t\tid,\n\t\ttitle,\n\t\tparentId,\n\t\tcanHaveChildren: false,\n\t\tcanDownload: Boolean(attachment?.downloadUrl),\n\t\tresourceURI,\n\t\tcreatedAt: asset?.createdAt ?? null,\n\t\tupdatedAt: asset?.modifiedAt ?? null,\n\t\trawFields: asset,\n\t});\n}\n\nfunction buildRecord({\n\tid,\n\ttitle,\n\tparentId,\n\tcanHaveChildren,\n\tcanDownload,\n\tresourceURI,\n\tcreatedAt,\n\tupdatedAt,\n\trawFields,\n}) {\n\tconst fields = {\n\t\tid,\n\t\ttitle,\n\t\tcreatedAt,\n\t\tupdatedAt,\n\t\tparentId,\n\t\tcanHaveChildren,\n\t\tresourceURI,\n\t\tcanDownload,\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid,\n\t\tname: title,\n\t\turi: resourceURI,\n\t\tcreatedTime: createdAt,\n\t\tupdatedTime: updatedAt,\n\t\trawFields,\n\t};\n}\n"
