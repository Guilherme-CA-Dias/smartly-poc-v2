uuid: 79ea3db7-a99d-4ee2-badb-1e2c888013ae
key: find-content-item-by-id
name: Find Content Item By Id
isCustomized: true
isUniversal: true
inputSchema:
  type: object
  properties:
    id:
      type: string
type: run-javascript
config:
  code: "/**\n * Action: get a single Cloudinary folder or asset as a unified content item.\n *\n * Output matches the Google Drive get-content-item shape:\n * `{ fields, id, name, uri, createdTime, updatedTime, rawFields }`\n *\n * Action input:\n * - id (required): base64 JSON `{ id, type, resource_type? }` or raw public_id / folder path.\n *   Example file: `{\"id\":\"samples/photo\",\"type\":\"file\",\"resource_type\":\"image\"}`\n *   Example folder: `{\"id\":\"samples\",\"type\":\"folder\"}`\n */\n\nconst RESOURCE_DELIVERY_TYPE = \"upload\";\nconst RESOURCE_TYPES = [\"image\", \"video\", \"raw\"];\n\nmodule.exports = async function ({ input, externalApiClient }) {\n\ttry {\n\t\tconst rawId = input?.id;\n\t\tif (rawId == null || String(rawId).trim() === \"\") {\n\t\t\tthrow new Error(\"id is required in input\");\n\t\t}\n\n\t\tconst parsed = parseContentItemId(rawId);\n\t\tlet record;\n\t\tif (parsed.type === \"folder\") {\n\t\t\trecord = await getFolderRecord(externalApiClient, parsed.id);\n\t\t} else {\n\t\t\ttry {\n\t\t\t\trecord = await getAssetRecord(externalApiClient, parsed);\n\t\t\t} catch (assetError) {\n\t\t\t\tif (parsed.hadExplicitType) {\n\t\t\t\t\tthrow assetError;\n\t\t\t\t}\n\t\t\t\trecord = await getFolderRecord(externalApiClient, parsed.id);\n\t\t\t}\n\t\t}\n\n\t\treturn record;\n\t} catch (error) {\n\t\tthrow error;\n\t}\n};\n\nfunction parseContentItemId(encoded) {\n\tconst raw = String(encoded).trim();\n\n\ttry {\n\t\tconst decoded = JSON.parse(Buffer.from(raw, \"base64\").toString(\"utf8\"));\n\t\tconst type = String(decoded?.type ?? \"file\").toLowerCase();\n\t\tconst id = decoded?.id != null ? String(decoded.id) : \"\";\n\n\t\tif (!id) {\n\t\t\tthrow new Error(\"Decoded id is empty\");\n\t\t}\n\n\t\treturn {\n\t\t\tid: normalizeFolderPath(id),\n\t\t\ttype: type === \"folder\" ? \"folder\" : \"file\",\n\t\t\tresourceType: decoded.resource_type ?? decoded.resourceType ?? null,\n\t\t\thadExplicitType: true,\n\t\t};\n\t} catch (error) {\n\t\tif (error.message === \"Decoded id is empty\") {\n\t\t\tthrow error;\n\t\t}\n\t}\n\n\treturn {\n\t\tid: normalizeFolderPath(raw),\n\t\ttype: \"file\",\n\t\tresourceType: null,\n\t\thadExplicitType: false,\n\t};\n}\n\nfunction normalizeFolderPath(path) {\n\tif (path == null) return \"\";\n\treturn String(path).replace(/^\\/+|\\/+$/g, \"\");\n}\n\nfunction encodeContentItemId(payload) {\n\treturn Buffer.from(JSON.stringify(payload), \"utf8\").toString(\"base64\");\n}\n\nfunction encodePathForUrl(path) {\n\treturn path\n\t\t.split(\"/\")\n\t\t.filter(Boolean)\n\t\t.map((segment) => encodeURIComponent(segment))\n\t\t.join(\"/\");\n}\n\nasync function getAssetRecord(externalApiClient, parsed) {\n\tconst publicId = parsed.id;\n\tconst types = parsed.resourceType\n\t\t? [String(parsed.resourceType)]\n\t\t: RESOURCE_TYPES;\n\n\tlet resource = null;\n\tlet resolvedType = null;\n\tlet lastError = null;\n\n\tfor (const resourceType of types) {\n\t\ttry {\n\t\t\tconst path = `/resources/${resourceType}/${RESOURCE_DELIVERY_TYPE}/${encodePathForUrl(publicId)}`;\n\t\t\tconst res = await externalApiClient.get(path);\n\t\t\tresource = res?.data ?? res;\n\t\t\tif (resource) {\n\t\t\t\tresolvedType = resourceType;\n\t\t\t\tbreak;\n\t\t\t}\n\t\t} catch (error) {\n\t\t\tlastError = error;\n\t\t}\n\t}\n\n\tif (!resource) {\n\t\tthrow lastError ?? new Error(`Cloudinary asset not found: ${publicId}`);\n\t}\n\n\treturn mapAssetToRecord(resource, resolvedType, publicId);\n}\n\nasync function getFolderRecord(externalApiClient, folderPath) {\n\tconst normalized = normalizeFolderPath(folderPath);\n\tif (!normalized) {\n\t\tthrow new Error(\"Cannot fetch the account root as a folder item\");\n\t}\n\n\tif (!normalized.includes(\"/\")) {\n\t\tconst rootRes = await externalApiClient.get(\"/folders\");\n\t\tconst rootBody = rootRes?.data ?? rootRes;\n\t\tconst match = (rootBody?.folders ?? []).find(\n\t\t\t(f) => normalizeFolderPath(f?.path ?? f?.name) === normalized,\n\t\t);\n\t\tif (match) {\n\t\t\treturn mapFolderToRecord(normalized, match);\n\t\t}\n\t}\n\n\tawait externalApiClient.get(`/folders/${encodePathForUrl(normalized)}`);\n\n\tconst name = normalized.split(\"/\").pop() || normalized;\n\treturn mapFolderToRecord(normalized, { path: normalized, name });\n}\n\nfunction parentFolderPath(folderPath) {\n\tconst normalized = normalizeFolderPath(folderPath);\n\tif (!normalized) return null;\n\tconst slash = normalized.lastIndexOf(\"/\");\n\tif (slash < 0) return null;\n\treturn normalized.slice(0, slash);\n}\n\nfunction parentIdForPath(folderPath) {\n\tconst parent = parentFolderPath(folderPath);\n\tif (!parent) return null;\n\treturn encodeContentItemId({ id: parent, type: \"folder\" });\n}\n\nfunction mapFolderToRecord(folderPath, folder) {\n\tconst path = normalizeFolderPath(folder?.path ?? folder?.name ?? folderPath);\n\tconst title = folder?.name ?? path.split(\"/\").pop() ?? path;\n\tconst encodedId = encodeContentItemId({ id: path, type: \"folder\" });\n\tconst parentId = parentIdForPath(path);\n\n\tconst fields = {\n\t\tid: encodedId,\n\t\ttitle,\n\t\tcreatedAt: null,\n\t\tupdatedAt: null,\n\t\tparentId,\n\t\tcanHaveChildren: true,\n\t\tresourceURI: path,\n\t\tcanDownload: false,\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid: encodedId,\n\t\tname: title,\n\t\turi: path,\n\t\tcreatedTime: null,\n\t\tupdatedTime: null,\n\t\trawFields: folder,\n\t};\n}\n\nfunction mapAssetToRecord(resource, resourceType, publicId) {\n\tconst id = publicId || resource?.public_id || \"\";\n\tconst title =\n\t\tresource?.filename ||\n\t\tid.split(\"/\").pop() ||\n\t\tid ||\n\t\tresource?.asset_id ||\n\t\t\"Untitled\";\n\tconst encodedId = encodeContentItemId({\n\t\tid,\n\t\ttype: \"file\",\n\t\tresource_type: resourceType ?? resource?.resource_type ?? \"image\",\n\t});\n\tconst parentId = parentIdForPath(id);\n\tconst createdAt = resource?.created_at ?? null;\n\tconst updatedAt = resource?.updated_at ?? resource?.created_at ?? null;\n\tconst resourceURI =\n\t\tresource?.secure_url ?? resource?.url ?? resource?.playback_url ?? id;\n\n\tconst fields = {\n\t\tid: encodedId,\n\t\ttitle,\n\t\tcreatedAt,\n\t\tupdatedAt,\n\t\tparentId,\n\t\tcanHaveChildren: false,\n\t\tresourceURI,\n\t\tcanDownload: Boolean(resourceURI && resourceURI !== id),\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid: encodedId,\n\t\tname: title,\n\t\turi: resourceURI,\n\t\tcreatedTime: createdAt,\n\t\tupdatedTime: updatedAt,\n\t\trawFields: resource,\n\t};\n}\n"
