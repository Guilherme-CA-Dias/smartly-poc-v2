uuid: 6bfe2e0e-256c-4266-a243-6ad28a3578b2
key: download-content-item
name: Download Content Item
isCustomized: true
isUniversal: true
inputSchema:
  type: object
  properties:
    id:
      type: string
  required:
    - id
type: run-javascript
config:
  code: "/**\n * Action: download a Cloudinary asset (Google Drive download-content-item equivalent).\n *\n * Drive flow: GET file metadata (mimeType, exportLinks) → GET export URL → file bytes.\n * Cloudinary: Admin API metadata → delivery URL(s) with fl_attachment → Membrane /files.\n *\n * Action input:\n * - id (required): base64 `{ id, type, resource_type? }` or raw public_id (from list/get/search).\n * - mimeType (optional): key from exportLinks to download (defaults to the asset's native type).\n * - metadataOnly (optional): when true, returns mimeType + exportLinks only (no download).\n */\n\nconst RESOURCE_DELIVERY_TYPE = \"upload\";\nconst RESOURCE_TYPES = [\"image\", \"video\", \"raw\"];\n\nconst FORMAT_TO_MIME = {\n\tjpg: \"image/jpeg\",\n\tjpeg: \"image/jpeg\",\n\tpng: \"image/png\",\n\tgif: \"image/gif\",\n\twebp: \"image/webp\",\n\tsvg: \"image/svg+xml\",\n\tbmp: \"image/bmp\",\n\ttiff: \"image/tiff\",\n\ttif: \"image/tiff\",\n\tico: \"image/x-icon\",\n\tpdf: \"application/pdf\",\n\tmp4: \"video/mp4\",\n\twebm: \"video/webm\",\n\tmov: \"video/quicktime\",\n\tmp3: \"audio/mpeg\",\n\twav: \"audio/wav\",\n\tzip: \"application/zip\",\n\ttxt: \"text/plain\",\n\tcsv: \"text/csv\",\n\tjson: \"application/json\",\n\txml: \"application/xml\",\n};\n\nconst IMAGE_EXPORT_FORMATS = [\"jpg\", \"png\", \"webp\", \"gif\"];\n\nmodule.exports = async function ({\n\tinput,\n\texternalApiClient,\n\tengineApiClient,\n}) {\n\ttry {\n\t\tconst rawId = input?.id;\n\t\tif (rawId == null || String(rawId).trim() === \"\") {\n\t\t\tthrow new Error(\"id is required in input\");\n\t\t}\n\n\t\tconst parsed = parseContentItemId(rawId);\n\t\tif (parsed.type === \"folder\") {\n\t\t\tthrow new Error(\"Folders cannot be downloaded\");\n\t\t}\n\n\t\tconst resource = await fetchAssetResource(externalApiClient, parsed);\n\t\tconst mimeType = mimeTypeForResource(resource);\n\t\tconst exportLinks = buildExportLinks(resource);\n\t\tconst fileName = fileNameForResource(resource);\n\n\t\tif (input?.metadataOnly === true) {\n\t\t\treturn { mimeType, exportLinks, fileName };\n\t\t}\n\n\t\tconst selectedMime =\n\t\t\tinput?.mimeType != null && String(input.mimeType).trim() !== \"\"\n\t\t\t\t? String(input.mimeType).trim()\n\t\t\t\t: mimeType;\n\n\t\tconst downloadUrl =\n\t\t\texportLinks[selectedMime] ??\n\t\t\texportLinks[mimeType] ??\n\t\t\tObject.values(exportLinks)[0];\n\n\t\tif (!downloadUrl) {\n\t\t\tthrow new Error(\"No download URL available for this asset\");\n\t\t}\n\n\t\tif (!engineApiClient) {\n\t\t\tthrow new Error(\"engineApiClient is required to store downloaded file bytes\");\n\t\t}\n\n\t\tconst stored = await downloadToMembraneFiles(\n\t\t\tdownloadUrl,\n\t\t\tfileName,\n\t\t\texternalApiClient,\n\t\t\tengineApiClient,\n\t\t);\n\n\t\treturn {\n\t\t\tmimeType: selectedMime,\n\t\t\texportLinks,\n\t\t\tfileName,\n\t\t\tdownloadUri: stored.downloadUri,\n\t\t\tcontentType: stored.contentType,\n\t\t\tcontentLength: stored.contentLength,\n\t\t};\n\t} catch (error) {\n\t\tthrow error;\n\t}\n};\n\nfunction parseContentItemId(encoded) {\n\tconst raw = String(encoded).trim();\n\n\ttry {\n\t\tconst decoded = JSON.parse(Buffer.from(raw, \"base64\").toString(\"utf8\"));\n\t\tconst type = String(decoded?.type ?? \"file\").toLowerCase();\n\t\tconst id = decoded?.id != null ? String(decoded.id) : \"\";\n\n\t\tif (!id) {\n\t\t\tthrow new Error(\"Decoded id is empty\");\n\t\t}\n\n\t\treturn {\n\t\t\tid: normalizeFolderPath(id),\n\t\t\ttype: type === \"folder\" ? \"folder\" : \"file\",\n\t\t\tresourceType: decoded.resource_type ?? decoded.resourceType ?? null,\n\t\t};\n\t} catch (error) {\n\t\tif (error.message === \"Decoded id is empty\") {\n\t\t\tthrow error;\n\t\t}\n\t}\n\n\treturn {\n\t\tid: normalizeFolderPath(raw),\n\t\ttype: \"file\",\n\t\tresourceType: null,\n\t};\n}\n\nfunction normalizeFolderPath(path) {\n\tif (path == null) return \"\";\n\treturn String(path).replace(/^\\/+|\\/+$/g, \"\");\n}\n\nfunction encodePathForUrl(path) {\n\treturn path\n\t\t.split(\"/\")\n\t\t.filter(Boolean)\n\t\t.map((segment) => encodeURIComponent(segment))\n\t\t.join(\"/\");\n}\n\nasync function fetchAssetResource(externalApiClient, parsed) {\n\tconst publicId = parsed.id;\n\tconst types = parsed.resourceType\n\t\t? [String(parsed.resourceType)]\n\t\t: RESOURCE_TYPES;\n\n\tlet resource = null;\n\tlet lastError = null;\n\n\tfor (const resourceType of types) {\n\t\ttry {\n\t\t\tconst path = `/resources/${resourceType}/${RESOURCE_DELIVERY_TYPE}/${encodePathForUrl(publicId)}`;\n\t\t\tconst res = await externalApiClient.get(path);\n\t\t\tresource = res?.data ?? res;\n\t\t\tif (resource) break;\n\t\t} catch (error) {\n\t\t\tlastError = error;\n\t\t}\n\t}\n\n\tif (!resource) {\n\t\tthrow lastError ?? new Error(`Cloudinary asset not found: ${publicId}`);\n\t}\n\n\treturn resource;\n}\n\nfunction mimeTypeForResource(resource) {\n\tconst format = String(resource?.format ?? \"\").toLowerCase();\n\tif (format && FORMAT_TO_MIME[format]) {\n\t\treturn FORMAT_TO_MIME[format];\n\t}\n\n\tconst resourceType = String(resource?.resource_type ?? \"image\").toLowerCase();\n\tif (resourceType === \"video\") return \"video/mp4\";\n\tif (resourceType === \"raw\") return \"application/octet-stream\";\n\treturn \"image/jpeg\";\n}\n\nfunction fileNameForResource(resource) {\n\tif (resource?.filename) return String(resource.filename);\n\n\tconst publicId = resource?.public_id ?? \"asset\";\n\tconst base = publicId.split(\"/\").pop() || publicId;\n\tconst format = resource?.format ? `.${resource.format}` : \"\";\n\treturn `${base}${format}`;\n}\n\nfunction buildExportLinks(resource) {\n\tconst secureUrl = resource?.secure_url ?? resource?.url;\n\tif (!secureUrl) {\n\t\treturn {};\n\t}\n\n\tconst links = {};\n\tconst nativeMime = mimeTypeForResource(resource);\n\tlinks[nativeMime] = withDeliveryTransform(secureUrl, \"fl_attachment\");\n\n\tconst resourceType = String(resource?.resource_type ?? \"\").toLowerCase();\n\tif (resourceType === \"image\") {\n\t\tfor (const format of IMAGE_EXPORT_FORMATS) {\n\t\t\tconst mime = FORMAT_TO_MIME[format];\n\t\t\tif (!mime || links[mime]) continue;\n\t\t\tlinks[mime] = withDeliveryTransform(\n\t\t\t\tsecureUrl,\n\t\t\t\t`fl_attachment,f_${format}`,\n\t\t\t);\n\t\t}\n\t}\n\n\treturn links;\n}\n\nfunction withDeliveryTransform(secureUrl, transformation) {\n\tconst marker = \"/upload/\";\n\tconst idx = secureUrl.indexOf(marker);\n\tif (idx < 0) return secureUrl;\n\n\tconst prefix = secureUrl.slice(0, idx + marker.length);\n\tconst suffix = secureUrl.slice(idx + marker.length);\n\tif (suffix.startsWith(`${transformation}/`)) {\n\t\treturn secureUrl;\n\t}\n\treturn `${prefix}${transformation}/${suffix}`;\n}\n\nasync function downloadToMembraneFiles(\n\turl,\n\tfileName,\n\texternalApiClient,\n\tengineApiClient,\n) {\n\tconst fileResponse = await externalApiClient.makeApiRequest({\n\t\tpath: url,\n\t\tmethod: \"get\",\n\t\tresponseType: \"stream\",\n\t\treturnFullResponse: true,\n\t});\n\n\tif (!fileResponse?.data) {\n\t\tthrow new Error(\"No file stream returned from Cloudinary delivery URL\");\n\t}\n\n\tconst contentType =\n\t\tfileResponse.headers?.[\"content-type\"] || \"application/octet-stream\";\n\n\tconst res = await engineApiClient.post(\"/files\", fileResponse.data, {\n\t\theaders: {\n\t\t\t\"Content-Length\": fileResponse.headers?.[\"content-length\"],\n\t\t\t\"Content-Type\": contentType,\n\t\t\t\"X-File-Name\": fileName,\n\t\t},\n\t\tmaxRedirects: 0,\n\t});\n\n\tconst payload = res?.data ?? res;\n\tif (!payload?.downloadUri) {\n\t\tthrow new Error(\"Membrane /files did not return downloadUri\");\n\t}\n\n\treturn {\n\t\tdownloadUri: payload.downloadUri,\n\t\tcontentType,\n\t\tcontentLength: fileResponse.headers?.[\"content-length\"] ?? null,\n\t};\n}\n"
customOutputSchema:
  type: object
  properties:
    downloadURI:
      type: string
    content:
      type: string
