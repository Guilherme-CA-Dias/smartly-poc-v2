config:
  code: "/**\n * Action: list Cloudinary folders and assets for a file-picker UI.\n *\n * Output: `{ records: [...], cursor: string | null }` (same shape as Frontify / Bynder).\n *\n * Action input:\n * - parentId (optional): Cloudinary folder path. Omit, null, \"\", or \"root\" for account root.\n * - recursive (optional): `false` (default) = direct children only; `true` = full subtree.\n * - cursor (optional): pagination token from the previous response.\n */\n\nconst PAGE_SIZE = 100;\nconst RESOURCE_DELIVERY_TYPE = \"upload\";\nconst RESOURCE_TYPES = [\"image\", \"video\", \"raw\"];\n\nconst ROOT_PARENT_TYPES = new Set([\"root\", \"my-drive\", \"drive\"]);\n\nmodule.exports = async function ({ input, externalApiClient }) {\n\ttry {\n\t\tconst folderPath = resolveFolderPath(input?.parentId);\n\t\tconst recursive = Boolean(input?.recursive);\n\t\tconst parentIdKey = folderPath ? folderPath : \"\";\n\n\t\tconst state = decodeCursor(input?.cursor, {\n\t\t\tparentId: parentIdKey,\n\t\t\trecursive,\n\t\t\tfolderPath,\n\t\t});\n\n\t\tconst { records, nextState } = await fetchPage({\n\t\t\texternalApiClient,\n\t\t\tfolderPath,\n\t\t\trecursive,\n\t\t\tstate,\n\t\t});\n\n\t\treturn {\n\t\t\trecords,\n\t\t\tcursor: encodeCursor(\n\t\t\t\tnextState ? { ...nextState, parentId: parentIdKey, recursive } : null,\n\t\t\t),\n\t\t};\n\t} catch (error) {\n\t\tthrow error;\n\t}\n};\n\nfunction normalizeFolderPath(path) {\n\tif (path == null) return \"\";\n\treturn String(path).replace(/^\\/+|\\/+$/g, \"\");\n}\n\n/** Returns folder path, or \"\" for root. */\nfunction resolveFolderPath(parentId) {\n\tif (parentId == null) {\n\t\treturn \"\";\n\t}\n\n\tconst raw = String(parentId).trim();\n\tif (!raw || raw.toLowerCase() === \"root\") {\n\t\treturn \"\";\n\t}\n\n\ttry {\n\t\tconst decoded = JSON.parse(Buffer.from(raw, \"base64\").toString(\"utf8\"));\n\t\tconst type = String(decoded?.type ?? \"\").toLowerCase();\n\t\tif (ROOT_PARENT_TYPES.has(type)) {\n\t\t\treturn \"\";\n\t\t}\n\t\tif (type === \"folder\") {\n\t\t\treturn normalizeFolderPath(decoded.id);\n\t\t}\n\t} catch {\n\t\t// Raw Cloudinary folder path or public id prefix.\n\t}\n\n\treturn normalizeFolderPath(raw);\n}\n\nfunction defaultState(folderPath, recursive) {\n\tif (recursive) {\n\t\treturn {\n\t\t\tfolderPath,\n\t\t\trecursive: true,\n\t\t\tphase: \"resources\",\n\t\t\tresourceTypeIndex: 0,\n\t\t\tapiCursor: null,\n\t\t};\n\t}\n\treturn {\n\t\tfolderPath,\n\t\trecursive: false,\n\t\tphase: \"folders\",\n\t\tresourceTypeIndex: 0,\n\t\tapiCursor: null,\n\t};\n}\n\nfunction decodeCursor(cursor, context) {\n\tif (cursor == null || String(cursor).trim() === \"\") {\n\t\treturn null;\n\t}\n\tconst raw = String(cursor).trim();\n\ttry {\n\t\tconst parsed = JSON.parse(Buffer.from(raw, \"base64\").toString(\"utf8\"));\n\t\tif (!parsed?.phase) {\n\t\t\tthrow new Error(\"Invalid cursor\");\n\t\t}\n\t\tif ((parsed.parentId ?? \"\") !== (context.parentId ?? \"\")) {\n\t\t\tthrow new Error(\"cursor parentId does not match input parentId\");\n\t\t}\n\t\tif (\n\t\t\tparsed.recursive != null &&\n\t\t\tBoolean(parsed.recursive) !== context.recursive\n\t\t) {\n\t\t\tthrow new Error(\"cursor recursive flag does not match input recursive\");\n\t\t}\n\t\treturn {\n\t\t\t...parsed,\n\t\t\tfolderPath: context.folderPath,\n\t\t\trecursive: context.recursive,\n\t\t};\n\t} catch (error) {\n\t\tif (error.message?.includes(\"does not match\")) {\n\t\t\tthrow error;\n\t\t}\n\t\tthrow new Error(\"cursor must be a base64-encoded pagination state\");\n\t}\n}\n\nfunction encodeCursor(state) {\n\tif (!state) return null;\n\treturn Buffer.from(JSON.stringify(state), \"utf8\").toString(\"base64\");\n}\n\nasync function fetchPage({ externalApiClient, folderPath, recursive, state }) {\n\tconst activeState = state ?? defaultState(folderPath, recursive);\n\tconst records = [];\n\n\tif (activeState.phase === \"folders\") {\n\t\tconst folderRes = await listFolders({\n\t\t\texternalApiClient,\n\t\t\tfolderPath: activeState.folderPath ?? folderPath,\n\t\t\tnextCursor: activeState.apiCursor,\n\t\t});\n\n\t\tfor (const folder of folderRes?.folders ?? []) {\n\t\t\trecords.push(mapFolderToRecord(folder, activeState.folderPath ?? folderPath));\n\t\t}\n\n\t\tif (folderRes?.next_cursor) {\n\t\t\treturn {\n\t\t\t\trecords,\n\t\t\t\tnextState: {\n\t\t\t\t\t...activeState,\n\t\t\t\t\tphase: \"folders\",\n\t\t\t\t\tapiCursor: folderRes.next_cursor,\n\t\t\t\t},\n\t\t\t};\n\t\t}\n\n\t\treturn fetchResourcesPage({\n\t\t\texternalApiClient,\n\t\t\trecords,\n\t\t\tstate: {\n\t\t\t\t...activeState,\n\t\t\t\tphase: \"resources\",\n\t\t\t\tresourceTypeIndex: 0,\n\t\t\t\tapiCursor: null,\n\t\t\t},\n\t\t\tfolderPath,\n\t\t\trecursive,\n\t\t});\n\t}\n\n\treturn fetchResourcesPage({\n\t\texternalApiClient,\n\t\trecords,\n\t\tstate: activeState,\n\t\tfolderPath,\n\t\trecursive,\n\t});\n}\n\nasync function fetchResourcesPage({\n\texternalApiClient,\n\trecords,\n\tstate,\n\tfolderPath,\n\trecursive,\n}) {\n\tconst listFolderPath = state.folderPath ?? folderPath ?? \"\";\n\tconst isRecursive = Boolean(state.recursive ?? recursive);\n\tlet typeIndex = state.resourceTypeIndex ?? 0;\n\tlet apiCursor = state.apiCursor ?? null;\n\n\twhile (typeIndex < RESOURCE_TYPES.length) {\n\t\tconst resourceType = RESOURCE_TYPES[typeIndex];\n\n\t\tconst resourceRes = await listResources({\n\t\t\texternalApiClient,\n\t\t\tfolderPath: listFolderPath,\n\t\t\tresourceType,\n\t\t\tnextCursor: apiCursor,\n\t\t});\n\n\t\tfor (const resource of resourceRes?.resources ?? []) {\n\t\t\tif (!isRecursive && !isDirectResourceChild(resource?.public_id, listFolderPath)) {\n\t\t\t\tcontinue;\n\t\t\t}\n\t\t\trecords.push(mapResourceToRecord(resource, listFolderPath, isRecursive));\n\t\t}\n\n\t\tif (resourceRes?.next_cursor) {\n\t\t\treturn {\n\t\t\t\trecords,\n\t\t\t\tnextState: {\n\t\t\t\t\t...state,\n\t\t\t\t\tfolderPath: listFolderPath,\n\t\t\t\t\trecursive: isRecursive,\n\t\t\t\t\tphase: \"resources\",\n\t\t\t\t\tresourceTypeIndex: typeIndex,\n\t\t\t\t\tapiCursor: resourceRes.next_cursor,\n\t\t\t\t},\n\t\t\t};\n\t\t}\n\n\t\ttypeIndex += 1;\n\t\tapiCursor = null;\n\t}\n\n\treturn { records, nextState: null };\n}\n\nfunction isDirectResourceChild(publicId, folderPath) {\n\tconst id = String(publicId ?? \"\");\n\tif (!id) return false;\n\tif (!folderPath) {\n\t\treturn !id.includes(\"/\");\n\t}\n\tconst prefix = `${folderPath}/`;\n\tif (!id.startsWith(prefix)) {\n\t\treturn false;\n\t}\n\tconst remainder = id.slice(prefix.length);\n\treturn remainder.length > 0 && !remainder.includes(\"/\");\n}\n\nfunction buildQuery(params) {\n\tconst search = new URLSearchParams();\n\tfor (const [key, value] of Object.entries(params)) {\n\t\tif (value != null && value !== \"\") {\n\t\t\tsearch.set(key, String(value));\n\t\t}\n\t}\n\tconst qs = search.toString();\n\treturn qs ? `?${qs}` : \"\";\n}\n\nasync function listFolders({ externalApiClient, folderPath, nextCursor }) {\n\tconst params = { max_results: PAGE_SIZE };\n\tif (nextCursor) params.next_cursor = nextCursor;\n\n\tconst basePath = folderPath\n\t\t? `/folders/${encodeFolderPath(folderPath)}`\n\t\t: \"/folders\";\n\n\tconst res = await externalApiClient.get(`${basePath}${buildQuery(params)}`);\n\treturn res?.data ?? res;\n}\n\nasync function listResources({\n\texternalApiClient,\n\tfolderPath,\n\tresourceType,\n\tnextCursor,\n}) {\n\tconst params = {\n\t\ttype: RESOURCE_DELIVERY_TYPE,\n\t\tmax_results: PAGE_SIZE,\n\t};\n\tif (nextCursor) params.next_cursor = nextCursor;\n\tif (folderPath) {\n\t\tparams.prefix = `${folderPath}/`;\n\t}\n\n\tconst res = await externalApiClient.get(\n\t\t`/resources/${resourceType}${buildQuery(params)}`,\n\t);\n\treturn res?.data ?? res;\n}\n\nfunction encodeFolderPath(folderPath) {\n\treturn folderPath\n\t\t.split(\"/\")\n\t\t.filter(Boolean)\n\t\t.map((segment) => encodeURIComponent(segment))\n\t\t.join(\"/\");\n}\n\nfunction parentIdForFolderPath(parentFolderPath) {\n\treturn parentFolderPath || null;\n}\n\nfunction parentIdFromPublicId(publicId) {\n\tconst normalized = String(publicId ?? \"\").replace(/\\/+$/, \"\");\n\tconst slash = normalized.lastIndexOf(\"/\");\n\tif (slash < 0) {\n\t\treturn null;\n\t}\n\treturn normalized.slice(0, slash);\n}\n\nfunction mapFolderToRecord(folder, parentFolderPath) {\n\tconst path = folder?.path ?? folder?.name ?? \"\";\n\tconst title = folder?.name ?? path.split(\"/\").pop() ?? path;\n\tconst id = path;\n\tconst parentId = parentIdForFolderPath(parentFolderPath);\n\tconst resourceURI = path;\n\n\tconst fields = {\n\t\tid,\n\t\ttitle,\n\t\tcreatedAt: null,\n\t\tupdatedAt: null,\n\t\tparentId,\n\t\tcanHaveChildren: true,\n\t\tresourceURI,\n\t\tcanDownload: false,\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid,\n\t\tname: title,\n\t\turi: resourceURI,\n\t\tcreatedTime: null,\n\t\tupdatedTime: null,\n\t\trawFields: folder,\n\t};\n}\n\nfunction mapResourceToRecord(resource, listFolderPath, recursive) {\n\tconst publicId = resource?.public_id ?? \"\";\n\tconst title =\n\t\tpublicId.split(\"/\").pop() ||\n\t\tpublicId ||\n\t\tresource?.asset_id ||\n\t\t\"Untitled\";\n\tconst id = publicId;\n\tconst parentId =\n\t\trecursive || !listFolderPath\n\t\t\t? parentIdFromPublicId(publicId)\n\t\t\t: parentIdForFolderPath(listFolderPath);\n\tconst createdAt = resource?.created_at ?? null;\n\tconst updatedAt = resource?.updated_at ?? resource?.created_at ?? null;\n\tconst resourceURI =\n\t\tresource?.secure_url ?? resource?.url ?? resource?.playback_url ?? publicId;\n\n\tconst fields = {\n\t\tid,\n\t\ttitle,\n\t\tcreatedAt,\n\t\tupdatedAt,\n\t\tparentId,\n\t\tcanHaveChildren: false,\n\t\tresourceURI,\n\t\tcanDownload: true,\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid,\n\t\tname: title,\n\t\turi: resourceURI,\n\t\tcreatedTime: createdAt,\n\t\tupdatedTime: updatedAt,\n\t\trawFields: resource,\n\t};\n}\n"
