config:
  code: "/**\n * Action: search Cloudinary folders and assets (Drive-style full-text query).\n *\n * Output: `{ records: [...], cursor: string | null }` (same shape as list / Google Drive search).\n *\n * Action input:\n * - query (required): free-text search term (e.g. \"test\").\n * - cursor (optional): pagination token from the previous response.\n */\n\nconst PAGE_SIZE = 100;\n\nmodule.exports = async function ({ input, externalApiClient }) {\n\ttry {\n\t\tconst query = input?.query;\n\t\tif (query == null || String(query).trim() === \"\") {\n\t\t\tthrow new Error(\"query is required in input\");\n\t\t}\n\n\t\tconst searchQuery = String(query).trim();\n\t\tconst state = decodeCursor(input?.cursor, searchQuery);\n\n\t\tconst { records, nextState } = await fetchSearchPage({\n\t\t\texternalApiClient,\n\t\t\tsearchQuery,\n\t\t\tstate,\n\t\t});\n\n\t\treturn {\n\t\t\trecords,\n\t\t\tcursor: encodeCursor(nextState ? { ...nextState, query: searchQuery } : null),\n\t\t};\n\t} catch (error) {\n\t\tthrow error;\n\t}\n};\n\nfunction defaultState() {\n\treturn {\n\t\tphase: \"folders\",\n\t\tfolderCursor: null,\n\t\tresourceCursor: null,\n\t};\n}\n\nfunction decodeCursor(cursor, searchQuery) {\n\tif (cursor == null || String(cursor).trim() === \"\") {\n\t\treturn null;\n\t}\n\tconst raw = String(cursor).trim();\n\ttry {\n\t\tconst parsed = JSON.parse(Buffer.from(raw, \"base64\").toString(\"utf8\"));\n\t\tif (!parsed?.phase) {\n\t\t\tthrow new Error(\"Invalid cursor\");\n\t\t}\n\t\tif ((parsed.query ?? \"\") !== searchQuery) {\n\t\t\tthrow new Error(\"cursor query does not match input query\");\n\t\t}\n\t\treturn parsed;\n\t} catch (error) {\n\t\tif (error.message?.includes(\"does not match\")) {\n\t\t\tthrow error;\n\t\t}\n\t\tthrow new Error(\"cursor must be a base64-encoded pagination state\");\n\t}\n}\n\nfunction encodeCursor(state) {\n\tif (!state) return null;\n\treturn Buffer.from(JSON.stringify(state), \"utf8\").toString(\"base64\");\n}\n\nasync function fetchSearchPage({ externalApiClient, searchQuery, state }) {\n\tconst activeState = state ?? defaultState();\n\tconst records = [];\n\tconst folderExpression = buildFolderSearchExpression(searchQuery);\n\tconst resourceExpression = buildResourceSearchExpression(searchQuery);\n\n\tif (activeState.phase === \"folders\" && folderExpression) {\n\t\twhile (records.length < PAGE_SIZE) {\n\t\t\tconst remaining = PAGE_SIZE - records.length;\n\t\t\tconst folderRes = await searchFolders({\n\t\t\t\texternalApiClient,\n\t\t\t\texpression: folderExpression,\n\t\t\t\tnextCursor: activeState.folderCursor,\n\t\t\t\tmaxResults: remaining,\n\t\t\t});\n\n\t\t\tfor (const folder of folderRes?.folders ?? []) {\n\t\t\t\trecords.push(mapFolderToRecord(folder));\n\t\t\t}\n\n\t\t\tif (folderRes?.next_cursor) {\n\t\t\t\treturn {\n\t\t\t\t\trecords,\n\t\t\t\t\tnextState: {\n\t\t\t\t\t\t...activeState,\n\t\t\t\t\t\tphase: \"folders\",\n\t\t\t\t\t\tfolderCursor: folderRes.next_cursor,\n\t\t\t\t\t},\n\t\t\t\t};\n\t\t\t}\n\n\t\t\tactiveState.phase = \"resources\";\n\t\t\tactiveState.folderCursor = null;\n\t\t\tbreak;\n\t\t}\n\t}\n\n\tif (activeState.phase === \"resources\" && resourceExpression) {\n\t\twhile (records.length < PAGE_SIZE) {\n\t\t\tconst remaining = PAGE_SIZE - records.length;\n\t\t\tconst resourceRes = await searchResources({\n\t\t\t\texternalApiClient,\n\t\t\t\texpression: resourceExpression,\n\t\t\t\tnextCursor: activeState.resourceCursor,\n\t\t\t\tmaxResults: remaining,\n\t\t\t});\n\n\t\t\tfor (const resource of resourceRes?.resources ?? []) {\n\t\t\t\trecords.push(mapResourceToRecord(resource));\n\t\t\t}\n\n\t\t\tif (resourceRes?.next_cursor) {\n\t\t\t\treturn {\n\t\t\t\t\trecords,\n\t\t\t\t\tnextState: {\n\t\t\t\t\t\t...activeState,\n\t\t\t\t\t\tphase: \"resources\",\n\t\t\t\t\t\tresourceCursor: resourceRes.next_cursor,\n\t\t\t\t\t},\n\t\t\t\t};\n\t\t\t}\n\n\t\t\treturn { records, nextState: null };\n\t\t}\n\t}\n\n\treturn { records, nextState: null };\n}\n\nfunction tokenizeQuery(query) {\n\treturn String(query)\n\t\t.trim()\n\t\t.split(/\\s+/)\n\t\t.filter(Boolean);\n}\n\nfunction escapeSearchToken(term) {\n\treturn String(term).replace(/([+\\-&|!(){}[\\]^\"~*?:\\\\\\/])/g, \"\\\\$1\");\n}\n\nfunction buildFolderSearchExpression(query) {\n\tconst tokens = tokenizeQuery(query);\n\tif (tokens.length === 0) {\n\t\treturn null;\n\t}\n\tconst clauses = tokens.map(\n\t\t(token) =>\n\t\t\t`(name:${escapeSearchToken(token)} OR path:${escapeSearchToken(token)})`,\n\t);\n\treturn clauses.join(\" AND \");\n}\n\nfunction buildResourceSearchExpression(query) {\n\tconst tokens = tokenizeQuery(query);\n\tif (tokens.length === 0) {\n\t\treturn null;\n\t}\n\treturn tokens.map((token) => escapeSearchToken(token)).join(\" AND \");\n}\n\nfunction buildQuery(params) {\n\tconst search = new URLSearchParams();\n\tfor (const [key, value] of Object.entries(params)) {\n\t\tif (value != null && value !== \"\") {\n\t\t\tsearch.set(key, String(value));\n\t\t}\n\t}\n\tconst qs = search.toString();\n\treturn qs ? `?${qs}` : \"\";\n}\n\nasync function searchFolders({\n\texternalApiClient,\n\texpression,\n\tnextCursor,\n\tmaxResults,\n}) {\n\tconst params = {\n\t\texpression,\n\t\tmax_results: maxResults ?? PAGE_SIZE,\n\t};\n\tif (nextCursor) {\n\t\tparams.next_cursor = nextCursor;\n\t}\n\n\tconst res = await externalApiClient.get(\n\t\t`/folders/search${buildQuery(params)}`,\n\t);\n\treturn res?.data ?? res;\n}\n\nasync function searchResources({\n\texternalApiClient,\n\texpression,\n\tnextCursor,\n\tmaxResults,\n}) {\n\tconst params = {\n\t\texpression,\n\t\tmax_results: maxResults ?? PAGE_SIZE,\n\t};\n\tif (nextCursor) {\n\t\tparams.next_cursor = nextCursor;\n\t}\n\n\tconst res = await externalApiClient.get(\n\t\t`/resources/search${buildQuery(params)}`,\n\t);\n\treturn res?.data ?? res;\n}\n\nfunction normalizeFolderPath(path) {\n\tif (path == null) return \"\";\n\treturn String(path).replace(/^\\/+|\\/+$/g, \"\");\n}\n\nfunction parentFolderPathFromPath(folderPath) {\n\tconst normalized = normalizeFolderPath(folderPath);\n\tconst slash = normalized.lastIndexOf(\"/\");\n\tif (slash < 0) {\n\t\treturn \"\";\n\t}\n\treturn normalized.slice(0, slash);\n}\n\nfunction encodeContentItemId(payload) {\n\treturn Buffer.from(JSON.stringify(payload), \"utf8\").toString(\"base64\");\n}\n\nfunction parentIdForFolderPath(parentFolderPath) {\n\tif (!parentFolderPath) return null;\n\treturn encodeContentItemId({ id: parentFolderPath, type: \"folder\" });\n}\n\nfunction parentIdFromPublicId(publicId) {\n\tconst normalized = String(publicId ?? \"\").replace(/\\/+$/, \"\");\n\tconst slash = normalized.lastIndexOf(\"/\");\n\tif (slash < 0) {\n\t\treturn null;\n\t}\n\treturn encodeContentItemId({\n\t\tid: normalized.slice(0, slash),\n\t\ttype: \"folder\",\n\t});\n}\n\nfunction mapFolderToRecord(folder) {\n\tconst path = normalizeFolderPath(folder?.path ?? folder?.name ?? \"\");\n\tconst title = folder?.name ?? path.split(\"/\").pop() ?? path;\n\tconst parentFolderPath = parentFolderPathFromPath(path);\n\tconst id = encodeContentItemId({ id: path, type: \"folder\" });\n\tconst parentId = parentIdForFolderPath(parentFolderPath);\n\tconst createdAt = folder?.created_at ?? null;\n\tconst updatedAt = folder?.updated_at ?? folder?.created_at ?? null;\n\tconst resourceURI = path;\n\n\tconst fields = {\n\t\tid,\n\t\ttitle,\n\t\tcreatedAt,\n\t\tupdatedAt,\n\t\tparentId,\n\t\tcanHaveChildren: true,\n\t\tresourceURI,\n\t\tcanDownload: false,\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid,\n\t\tname: title,\n\t\turi: resourceURI,\n\t\tcreatedTime: createdAt,\n\t\tupdatedTime: updatedAt,\n\t\trawFields: folder,\n\t};\n}\n\nfunction mapResourceToRecord(resource) {\n\tconst publicId = resource?.public_id ?? \"\";\n\tconst title =\n\t\tpublicId.split(\"/\").pop() ||\n\t\tpublicId ||\n\t\tresource?.asset_id ||\n\t\t\"Untitled\";\n\tconst id = encodeContentItemId({\n\t\tid: publicId,\n\t\ttype: \"file\",\n\t\tresource_type: resource?.resource_type ?? \"image\",\n\t});\n\tconst parentId = parentIdFromPublicId(publicId);\n\tconst createdAt = resource?.created_at ?? null;\n\tconst updatedAt = resource?.updated_at ?? resource?.created_at ?? null;\n\tconst resourceURI =\n\t\tresource?.secure_url ?? resource?.url ?? resource?.playback_url ?? publicId;\n\n\tconst fields = {\n\t\tid,\n\t\ttitle,\n\t\tcreatedAt,\n\t\tupdatedAt,\n\t\tparentId,\n\t\tcanHaveChildren: false,\n\t\tresourceURI,\n\t\tcanDownload: true,\n\t};\n\n\treturn {\n\t\tfields,\n\t\tid,\n\t\tname: title,\n\t\turi: resourceURI,\n\t\tcreatedTime: createdAt,\n\t\tupdatedTime: updatedAt,\n\t\trawFields: resource,\n\t};\n}\n"
